name: 📦 Publish to PyPI
run-name: Publish ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Ensure triggered from a tag
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "This workflow must be run against a tag, not a branch (got ref_type=${{ github.ref_type }}, ref=${{ github.ref_name }})."
            exit 1
          fi
          echo "Running from tag ${{ github.ref_name }}"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
