name: 🚀 Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (YYYY.M.b, no leading zeros -- e.g. 2026.7.1)"
        required: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]{4}\.([1-9]|1[0-2])\.([1-9]|[1-9][0-9])$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}. Expected YYYY.M.b (no leading zeros), e.g. 2026.7.1"
            exit 1
          fi
          echo "Version format is valid: ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true

      - name: Trigger PyPI publish
        run: gh workflow run publish-pypi.yaml --ref ${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
